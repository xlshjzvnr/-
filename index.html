<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Flight Physics Sim</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            /* Boeing Colors */
            --boeing-green: #00FF00;
            --boeing-cyan: #00FFFF;
            --boeing-magenta: #FF00FF;
            --boeing-bg: #0a0a0a;
            --sky-blue: #0066cc;
            --ground-brown: #8b5a2b;
            --tape-bg: rgba(30, 30, 30, 0.7);
            --tape-border: white;
            --plane-color: yellow;
            
            /* Theme Variables (Default to Boeing) */
            --theme-primary: var(--boeing-green);
            --theme-secondary: var(--boeing-cyan);
            --theme-sky: linear-gradient(to bottom, #003399, var(--sky-blue));
            --theme-ground: linear-gradient(to top, #4a3018, var(--ground-brown));
            --theme-horizon: 2px solid white;
            --theme-bg: #111;
        }

        /* 전투기 HUD 모드 컬러 변수 */
        body.fighter-mode {
            --theme-primary: #00FF00;
            --theme-secondary: #00FF00;
            --theme-sky: transparent;
            --theme-ground: transparent;
            --theme-horizon: 2px dashed #00FF00;
            --theme-bg: #001a00; /* 어두운 녹색 배경 */
            --tape-bg: transparent;
            --tape-border: #00FF00;
            --plane-color: #00FF00;
            --boeing-magenta: #00FF00;
        }

        body {
            background-color: #000;
            color: white;
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 600px;
            margin-bottom: 10px;
        }

        h1 {
            color: var(--theme-secondary);
            margin: 0;
            font-size: 1.3rem;
        }

        #theme-btn {
            background: #333;
            color: white;
            border: 1px solid var(--theme-primary);
            padding: 5px 10px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
        }
        #theme-btn:hover { background: var(--theme-primary); color: black; }

        /* 메인 시뮬레이터 컨테이너 */
        #sim-container {
            background-color: var(--boeing-bg);
            border: 2px solid #333;
            border-radius: 10px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
            overflow: hidden;
            position: relative;
        }

        /* 상단 PFD (Primary Flight Display) / HUD */
        #pfd {
            position: relative;
            height: 380px;
            background-color: var(--theme-bg);
            overflow: hidden;
            border-bottom: 2px solid #333;
        }

        /* 롤링을 위한 컨테이너 */
        #roll-container {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 1500px; /* 회전 시 모서리가 보이지 않게 크게 설정 */
            height: 1500px;
            transform-origin: center center;
            transform: translate(-50%, -50%) rotate(0deg);
            will-change: transform;
        }

        /* 피치를 위한 컨테이너 */
        #pitch-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            transform: translateY(0px);
            will-change: transform;
        }

        #sky {
            width: 100%; height: 50%;
            background: var(--theme-sky);
        }

        #ground {
            width: 100%; height: 50%;
            background: var(--theme-ground);
            border-top: var(--theme-horizon);
        }

        /* 피치 눈금 */
        .pitch-line {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            border-top: 2px solid var(--tape-border);
            text-align: center;
            color: var(--tape-border);
            font-size: 0.8rem;
            line-height: 0;
        }
        .pitch-line span { background: var(--theme-bg); padding: 0 4px; }
        body.fighter-mode .pitch-line span { background: transparent; }

        /* 중앙 비행기 심볼 (Boeing vs Fighter FPM) */
        #plane-symbol {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120px; height: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 15;
        }
        .wing { width: 40px; height: 4px; background-color: var(--plane-color); border: 1px solid black; }
        .center-dot { width: 12px; height: 12px; background-color: transparent; border: 3px solid var(--plane-color); border-radius: 10%; box-sizing: border-box; }
        
        body.fighter-mode .wing { height: 2px; border: none; }
        body.fighter-mode .center-dot { border-radius: 50%; border-width: 2px; position: relative; }
        /* 전투기 모드 FPM 수직 꼬리 날개 */
        body.fighter-mode .center-dot::after {
            content: ''; position: absolute;
            top: -10px; left: 3px;
            width: 2px; height: 8px; background-color: var(--plane-color);
        }

        /* 테이프 (속도, 고도, 방위각) */
        .tape {
            position: absolute;
            background-color: var(--tape-bg);
            border: 1px solid var(--tape-border);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .tape-vertical {
            top: 15%; bottom: 15%; width: 70px;
            flex-direction: column; font-size: 1.2rem;
        }
        #ias-tape { left: 10px; }
        #alt-tape { right: 10px; }
        
        #hdg-tape {
            top: 10px; left: 50%;
            transform: translateX(-50%);
            width: 120px; height: 35px;
            font-size: 1.2rem; font-weight: bold;
            color: var(--theme-primary);
        }
        
        .tape-label { color: var(--theme-secondary); font-size: 0.8rem; margin-bottom: 5px; }
        .tape-value {
            color: var(--theme-primary);
            font-weight: bold; font-size: 1.3rem;
            border: 2px solid var(--tape-border);
            padding: 5px; background: black;
            width: 80%; text-align: center;
        }
        body.fighter-mode .tape-value { background: transparent; }

        /* 실속 경고 */
        #stall-warning {
            position: absolute;
            top: 25%; left: 50%;
            transform: translateX(-50%);
            color: red; font-size: 2.5rem; font-weight: bold;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 20px; border: 2px solid red;
            display: none; animation: blink 0.4s infinite;
            z-index: 20;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        /* 피드백 패널 */
        #status-panel {
            padding: 10px 15px;
            display: flex; justify-content: space-between; align-items: center;
            background-color: #1a1a1a;
            border-bottom: 2px solid #333;
        }
        #feedback { color: var(--theme-secondary); font-size: 0.95rem; width: 65%; }
        #lift-status { color: var(--theme-primary); font-size: 0.95rem; text-align: right; width: 30%; }

        /* 하단 슬라이더 컨트롤 (격자 레이아웃 적용) */
        #controls {
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 20px;
        }
        .control-group { display: flex; align-items: center; justify-content: space-between; }
        .control-group label { width: 70px; color: var(--boeing-magenta); font-weight: bold; font-size: 0.9rem; }
        .control-group input[type="range"] { flex-grow: 1; margin: 0 10px; cursor: pointer; }
        .control-value { width: 45px; text-align: right; color: white; font-size: 0.9rem; }

        /* 시작 화면 */
        #start-screen {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex; justify-content: center; align-items: center;
            z-index: 100;
        }
        #start-btn {
            padding: 15px 30px; font-size: 1.5rem;
            background: var(--boeing-green); color: black;
            border: none; cursor: pointer; font-family: inherit; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>FLIGHT PHYSICS SIM</h1>
        <button id="theme-btn">FIGHTER HUD 변환</button>
    </div>

    <div id="sim-container">
        <div id="start-screen"><button id="start-btn">비행 시작</button></div>

        <div id="pfd">
            <div id="roll-container">
                <div id="pitch-container">
                    <div id="sky"></div>
                    <div id="ground"></div>
                    <div id="pitch-lines"></div>
                </div>
            </div>

            <div id="plane-symbol">
                <div class="wing"></div>
                <div class="center-dot"></div>
                <div class="wing"></div>
            </div>

            <!-- 계기판 테이프 -->
            <div id="hdg-tape" class="tape">HDG <span id="hdg-val" style="margin-left:10px;">360</span></div>

            <div id="ias-tape" class="tape tape-vertical">
                <div class="tape-label">IAS</div>
                <div id="ias-val" class="tape-value">250</div>
            </div>

            <div id="alt-tape" class="tape tape-vertical">
                <div class="tape-label">ALT</div>
                <div id="alt-val" class="tape-value">5000</div>
            </div>

            <div id="stall-warning">STALL</div>
        </div>

        <!-- 피드백 -->
        <div id="status-panel">
            <div id="feedback">이륙 준비 완료.</div>
            <div id="lift-status">V-LIFT: 100%</div>
        </div>

        <!-- 슬라이더 컨트롤 -->
        <div id="controls">
            <div class="control-group">
                <label>THRUST</label>
                <input type="range" id="thrust" min="0" max="100" value="50">
                <div id="thrust-val" class="control-value">50%</div>
            </div>
            <div class="control-group">
                <label>PITCH(CG)</label>
                <input type="range" id="cg" min="-15" max="15" step="1" value="0">
                <div id="cg-val" class="control-value">0</div>
            </div>
            <div class="control-group">
                <label>ROLL(Ail)</label>
                <input type="range" id="roll" min="-60" max="60" step="1" value="0">
                <div id="roll-val" class="control-value">0°</div>
            </div>
            <div class="control-group">
                <label>YAW(Rud)</label>
                <input type="range" id="yaw" min="-30" max="30" step="1" value="0">
                <div id="yaw-val" class="control-value">0°</div>
            </div>
            <div class="control-group" style="grid-column: span 2;">
                <label>FLAPS</label>
                <input type="range" id="flaps" min="0" max="30" step="10" value="0">
                <div id="flaps-val" class="control-value">0°</div>
            </div>
        </div>
    </div>

    <script>
        // --- 물리 및 상태 변수 ---
        let state = {
            ias: 250,        
            alt: 5000,       
            pitch: 0,        
            heading: 0,      // 방위각 (0~359)
            thrust: 50,      
            flaps: 0,        
            cg: 0,           // Pitch 제어
            rollTarget: 0,   // 슬라이더 롤 입력
            actualRoll: 0,   // 물리적 롤 (Bank angle)
            yawTarget: 0,    // 러더 입력
            mass: 100,       
            weight: 1000,    
            isStalling: false
        };

        const ui = {
            rollCont: document.getElementById('roll-container'),
            pitchCont: document.getElementById('pitch-container'),
            ias: document.getElementById('ias-val'),
            alt: document.getElementById('alt-val'),
            hdg: document.getElementById('hdg-val'),
            liftStatus: document.getElementById('lift-status'),
            feedback: document.getElementById('feedback'),
            stallWarn: document.getElementById('stall-warning'),
            inpThrust: document.getElementById('thrust'),
            inpFlaps: document.getElementById('flaps'),
            inpCG: document.getElementById('cg'),
            inpRoll: document.getElementById('roll'),
            inpYaw: document.getElementById('yaw'),
            valThrust: document.getElementById('thrust-val'),
            valFlaps: document.getElementById('flaps-val'),
            valCG: document.getElementById('cg-val'),
            valRoll: document.getElementById('roll-val'),
            valYaw: document.getElementById('yaw-val'),
            startScreen: document.getElementById('start-screen'),
            startBtn: document.getElementById('start-btn'),
            pitchLines: document.getElementById('pitch-lines'),
            themeBtn: document.getElementById('theme-btn')
        };

        // --- 테마 전환 로직 ---
        ui.themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('fighter-mode');
            if (document.body.classList.contains('fighter-mode')) {
                ui.themeBtn.innerText = "BOEING PFD 변환";
            } else {
                ui.themeBtn.innerText = "FIGHTER HUD 변환";
            }
        });

        // --- Web Audio API (실속 경고음) ---
        let audioCtx;
        let beepInterval;

        ui.startBtn.addEventListener('click', () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            ui.startScreen.style.display = 'none';
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        });

        function playStallBeep() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sawtooth'; // 전투기 스타일의 더 날카로운 경고음
            osc.frequency.setValueAtTime(450, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        // --- 피치 눈금 그리기 ---
        for(let i = -60; i <= 60; i += 10) {
            if(i === 0) continue;
            let line = document.createElement('div');
            line.className = 'pitch-line';
            line.style.top = `calc(50% - ${i * 4}px)`; // 1도당 4px
            line.style.width = i % 20 === 0 ? '100px' : '50px';
            line.innerHTML = `<span>${Math.abs(i)}</span>`;
            ui.pitchLines.appendChild(line);
        }

        // --- 입력 이벤트 ---
        ui.inpThrust.addEventListener('input', (e) => { state.thrust = parseInt(e.target.value); ui.valThrust.innerText = state.thrust + '%'; });
        ui.inpFlaps.addEventListener('input', (e) => { state.flaps = parseInt(e.target.value); ui.valFlaps.innerText = state.flaps + '°'; });
        ui.inpCG.addEventListener('input', (e) => { state.cg = parseInt(e.target.value); ui.valCG.innerText = state.cg; });
        ui.inpRoll.addEventListener('input', (e) => { state.rollTarget = parseInt(e.target.value); ui.valRoll.innerText = state.rollTarget + '°'; });
        ui.inpYaw.addEventListener('input', (e) => { state.yawTarget = parseInt(e.target.value); ui.valYaw.innerText = state.yawTarget + '°'; });

        // --- 메인 게임 루프 ---
        let lastTime = 0;
        function gameLoop(time) {
            const dt = Math.min((time - lastTime) / 1000, 0.1); 
            lastTime = time;

            // 1. Roll 갱신 (관성 적용)
            state.actualRoll += (state.rollTarget - state.actualRoll) * dt * 3;
            let rollRad = state.actualRoll * Math.PI / 180;

            // 2. 역학 계산
            const targetPitch = state.cg * 1.5;
            
            // 총 양력 계산
            let totalLift = (Math.pow(state.ias, 2) / 62500) * state.weight * (1 + state.flaps * 0.015);
            
            // 핵심 물리: 롤링 시 수직 양력(Vertical Lift)이 감소함! (고도 유지를 위해 Pitch를 올려야 함)
            let verticalLift = totalLift * Math.cos(rollRad);
            let horizontalLift = totalLift * Math.sin(rollRad); 

            // 항력 및 가속도 계산
            let drag = (Math.pow(state.ias, 2) / 62500) * 250 * (1 + state.flaps * 0.03) + (Math.abs(state.yawTarget) * 2); // 요우(러더) 조작 시 항력 추가
            let gravityAccel = state.weight * Math.sin(state.pitch * Math.PI / 180);
            let thrustForce = state.thrust * 5; 
            
            let accel = (thrustForce - drag - gravityAccel) / state.mass;
            state.ias += accel * dt * 10;
            if(state.ias < 0) state.ias = 0;

            // 선회율(Turn Rate) 및 방위각(Heading) 계산
            // 선회율 ∝ 수평 양력 / 속도 + 러더 입력
            let turnRate = (horizontalLift / (state.mass * Math.max(state.ias, 50)) * 500) + (state.yawTarget * 0.5);
            state.heading += turnRate * dt;
            if(state.heading >= 360) state.heading -= 360;
            if(state.heading < 0) state.heading += 360;

            // 실속(Stall) 처리
            let stallSpeed = 160 - (state.flaps * 1.2);
            if (state.ias < stallSpeed) {
                verticalLift *= 0.3; 
                state.pitch -= 25 * dt; 
                if (!state.isStalling) {
                    state.isStalling = true;
                    ui.stallWarn.style.display = 'block';
                    beepInterval = setInterval(playStallBeep, 400);
                }
            } else {
                state.pitch += (targetPitch - state.pitch) * dt * 2;
                if (state.isStalling) {
                    state.isStalling = false;
                    ui.stallWarn.style.display = 'none';
                    clearInterval(beepInterval);
                }
            }

            // 고도 업데이트 (수직 양력을 기준으로 계산)
            let verticalSpeed = ((verticalLift - state.weight) / state.mass * 50) + (state.ias * Math.sin(state.pitch * Math.PI / 180) * 15);
            state.alt += verticalSpeed * dt;
            if (state.alt < 0) { state.alt = 0; verticalSpeed = 0; } 

            // --- UI 업데이트 ---
            
            // 지평선 회전(Roll) 및 상하 이동(Pitch)
            ui.rollCont.style.transform = `translate(-50%, -50%) rotate(${-state.actualRoll}deg)`;
            ui.pitchCont.style.transform = `translateY(${state.pitch * 4}px)`;
            
            // 계기판 텍스트
            ui.ias.innerText = Math.round(state.ias);
            ui.alt.innerText = Math.round(state.alt);
            
            let displayHdg = Math.round(state.heading).toString().padStart(3, '0');
            displayHdg = displayHdg === "000" ? "360" : displayHdg;
            ui.hdg.innerText = displayHdg;
            
            // 양력 상태 및 피드백 (수직 양력 기준)
            let liftRatio = Math.round((verticalLift / state.weight) * 100);
            ui.liftStatus.innerText = `V-LIFT: ${liftRatio}%`;
            ui.liftStatus.style.color = liftRatio < 80 ? 'red' : (liftRatio > 120 ? 'orange' : 'var(--theme-primary)');

            if (state.isStalling) {
                ui.feedback.innerText = "⚠ 실속! 기수를 내리고(CG↓) 롤을 수평으로 맞추세요!";
                ui.feedback.style.color = "red";
            } else if (Math.abs(state.actualRoll) > 40 && liftRatio < 100) {
                ui.feedback.innerText = "급선회 중! 고도가 떨어집니다. 기수(Pitch)를 더 드세요!";
                ui.feedback.style.color = "orange";
            } else if (state.ias > 340) {
                ui.feedback.innerText = "과속! 추력을 줄이세요.";
                ui.feedback.style.color = "orange";
            } else {
                ui.feedback.innerText = Math.abs(state.actualRoll) > 10 ? "선회 비행 중 (Turning)" : "안정적인 비행 중입니다.";
                ui.feedback.style.color = "var(--theme-primary)";
            }

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
